<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 60">
  <!-- Llama mascot: simple silhouette facing left, light fill for dark backgrounds -->
  <!-- Body -->
  <ellipse cx="30" cy="46" rx="19" ry="12" fill="#d8d8d8"/>
  <!-- Neck (tilts from head center rightward to body) -->
  <polygon points="12,23 22,23 27,38 17,38" fill="#d8d8d8"/>
  <!-- Head -->
  <ellipse cx="13" cy="13" rx="10" ry="9" fill="#d8d8d8"/>
  <!-- Left ear -->
  <polygon points="7,8 10,0 15,7" fill="#d8d8d8"/>
  <!-- Right ear -->
  <polygon points="17,7 21,0 25,8" fill="#d8d8d8"/>
</svg>
